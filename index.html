        ],
        strategies: [
          { name: "Survey: Normalization Process Theory Questionnaire (NoMAD)", referenceUrl: "https://doi.org/10.1186/s12874-018-0590-y", referenceLabel: "Reference", instrumentUrl: "http://www.normalizationprocess.org/", instrumentLabel: "NoMAD Instrument Link:",
            description: "Use the 23-item, theory-based NoMAD survey to assess penetration from the perspective of staff involved in changing healthcare practices. It includes three general assessment items regarding current and future familiarity of the intervention and four theoretical constructs: coherence, cognitive participation, collective action, and reflexive monitoring."
          },
          { name: "Interview Coding Guide: Normalization Process Theory Interview Guide", referenceUrl: "https://doi.org/10.1186/1748-5908-8-43", referenceLabel: "Reference", instrumentUrl: "https://dissemination-implementation.org/wp-content/uploads/2024/09/Normalization-Processing-Theory-Interview_Coding-Guide.pdf", instrumentLabel: "Normalization Process Theory Interview Guide Instrument Link:",
            description: "Use the Normalization Process Theory Interview Guide in combination with the NoMAD survey as a qualitative framework to evaluate how a medical intervention innovation becomes embedded and integrated into intended contexts."
          },
          { name: "Survey: Pragmatic Context Assessment Tool (pCAT)", referenceUrl: "https://doi.org/10.1186/s43058-022-00380-5", referenceLabel: "Reference", instrumentUrl: "https://dissemination-implementation.org/wp-content/uploads/2025/05/pCAT-Tool.pdf", instrumentLabel: "pCAT Instrument Link:",
            description: "Use the 14-item quantitative pCAT instrument to determine the level of penetration or the tangible fit of a medical intervention innovation within an organization’s existing subsystems. It is based on CFIR but translates technical constructs into everyday language familiar to clinicians."
          }
        ]
      },
      {
        id: "sustainability",
        title: "Sustainability",
        type: "strategy",
        definition: "The extent to which a newly implemented treatment is maintained or institutionalized within ongoing, stable operations.",
        stakeholders: [
          "Senior leadership (e.g., service line directors, chief medical officer, executive sponsors)",
          "Mid-level operational managers (e.g., clinical managers, program managers, quality improvement directors)",
          "Financial decision-makers",
          "Clinical leadership (e.g., influential physicians, nursing leadership, clinical governance leads)",
          "Implementation infrastructure personnel (e.g., IT/data, analytics, clinical informatics)",
          "Front-line users (e.g., clinicians, nurses, support staff)"
        ],
        topics: [
          { title: "Strategic alignment", question: "In what ways do you believe this practice has become essential to your clinic’s long-term vision and reputation for quality?" },
          { title: "Financial institutionalization", question: "How are we ensuring that the financial resources needed for this program are protected during future budget cycles?" },
          { title: "Role formalization", question: "To what extent have the tasks required for this intervention been officially integrated into your team’s annual performance evaluations?" },
          { title: "Infrastructure & data systems", question: "What permanent or long-term systems are in place to ensure that data from this practice continues to be visible to clinical teams over the long term?" },
          { title: "Training and knowledge transfer", question: "What mechanisms exist to ensure that as new staff join the team, they receive the specialized training needed to maintain the intervention’s quality?" },
          { title: "Adaptability", question: "What opportunities do you have to suggest improvements to the workflow to make this intervention easier to maintain during busy shifts?" },
          { title: "Maintenance and leadership continuity", question: "Who are the emerging leaders within the clinical team who have taken on the responsibility of advocating for this practice?" },
          { title: "External environmental pressure", question: "How do external factors like accreditation requirements or payor satisfaction influence the commitment to funding this practice long-term?" }
        ],
        strategies: [
          { name: "Interview Framework: the Practical, Robust Implementation and Sustainability Infrastructure Assessment (PRISM)", referenceUrl: "https://doi.org/10.1016/S1553-7250(08)34030-6", referenceLabel: "Reference",
            description: "Use the context-oriented PRISM as a comprehensive framework to organize interviews for predicting the sustainability of a medical intervention innovation. PRISM predicts and enhances institutionalization by assessing maintenance infrastructure, organizational and management expectations, adaptability and usability from the organizational perspective, and external environmental pressure from the outset of the project."
          }
        ],
        altEvidence: [
          { name: "Document Evidence Review", icon: "file-text", referenceUrl: "https://doi.org/10.1016/S1553-7250(08)34030-6", referenceLabel: "Reference",
            description: "Review budget documents, policy drafts, standard operating procedures, workflow maps, and staffing plans to determine whether sustainability is supported by formal structures, resources, and operating routines rather than temporary project conditions."
          }
        ]
      }
    ];

    const colorStyles = {
      design: {
        card: "border-emerald-100",
        header: "bg-emerald-50 border-emerald-100",
        accent: "text-emerald-800",
        badge: "bg-emerald-200 text-emerald-800",
        solid: "bg-emerald-500",
        pill: "bg-white border-emerald-200 text-emerald-700"
      },
      transitionary: {
        card: "border-purple-100",
        header: "bg-purple-50 border-purple-100",
        accent: "text-purple-800",
        badge: "bg-purple-200 text-purple-800",
        solid: "bg-purple-500",
        pill: "bg-white border-purple-200 text-purple-700"
      },
      strategy: {
        card: "border-slate-200",
        header: "bg-slate-100 border-slate-200",
        accent: "text-slate-800",
        badge: "bg-slate-700 text-white",
        solid: "bg-slate-600",
        pill: "bg-slate-700 border-slate-700 text-white"
      }
    };

    const typeLabel = (type) => {
      if (type === "design") return "Design Focused";
      if (type === "transitionary") return "Transitionary";
      return "Strategy Focused";
    };

    const measureLabel = (type) => {
      if (type === "design") return "Direct Measure";
      if (type === "transitionary") return "Bridge Measure";
      return "Exploratory";
    };

    const TopicAccordion = ({ topic, tone }) => {
      const [open, setOpen] = useState(true);
      return (
        <div className="border border-blue-100 rounded-xl bg-blue-50/40 overflow-hidden avoid-break">
          <button onClick={() => setOpen(!open)} className="w-full text-left p-3 flex items-start justify-between gap-3 screen-only">
            <div>
              <p className="text-sm font-bold text-gray-900 leading-snug">{topic.title}</p>
              <p className="text-xs text-blue-700 mt-1">Click to view sample question</p>
            </div>
            <Icon name={open ? "chevron-up" : "chevron-down"} size={16} className="text-blue-600 mt-0.5" />
          </button>
          <div className={`${open ? 'block' : 'hidden'} screen-only px-3 pb-3`}>
            <p className="text-sm italic text-gray-700 leading-relaxed">“{topic.question}”</p>
          </div>
          <div className="print-only p-3">
            <p className="text-[12px] font-semibold text-gray-900 leading-snug">{topic.title}</p>
            <p className="text-[11px] italic text-gray-700 leading-relaxed mt-1">“{topic.question}”</p>
          </div>
        </div>
      );
    };

    const StrategyAccordion = ({ item, color = "purple" }) => {
      const [open, setOpen] = useState(true);
      const palette = color === "indigo"
        ? { box: "bg-indigo-50 border-indigo-100", text: "text-indigo-900", icon: "text-indigo-500", soft: "text-indigo-700" }
        : { box: "bg-purple-50 border-purple-100", text: "text-purple-900", icon: "text-purple-500", soft: "text-purple-700" };

      return (
        <div className={`rounded-xl border ${palette.box} overflow-hidden avoid-break`}>
          <button onClick={() => setOpen(!open)} className={`w-full p-3 text-left flex items-start justify-between gap-3 screen-only ${palette.text}`}>
            <div>
              {item.referenceUrl ? (
                <a
                  href={item.referenceUrl}
                  target="_blank"
                  rel="noopener noreferrer"
                  onClick={(e) => e.stopPropagation()}
                  className="text-[13px] font-semibold leading-snug underline underline-offset-2"
                >
                  {item.name}
                </a>
              ) : (
                <p className="text-[13px] font-semibold leading-snug">{item.name}</p>
              )}
              
            </div>
            <Icon name={open ? "chevron-up" : "chevron-down"} size={16} className={`${palette.icon} mt-0.5`} />
          </button>
          <div className={`${open ? 'block' : 'hidden'} screen-only px-3 pb-3`}>
            <p className="text-[13px] leading-relaxed text-gray-700">{item.description}</p>
            <div className="mt-3 space-y-2">
              {item.referenceUrl && item.instrumentUrl && (
                <a href={item.referenceUrl} target="_blank" rel="noopener noreferrer" className={`inline-flex items-center gap-2 text-[12px] ${palette.text}`}>
                  <Icon name="external-link" size={13} className={palette.icon} />
                </a>
              )}
              {item.instrumentUrl && (
                <div>
                  <p className={`text-[11px] font-semibold ${palette.soft}`}>{item.instrumentLabel || "Instrument Link:"}</p>
                  <a href={item.instrumentUrl} target="_blank" rel="noopener noreferrer" className={`inline-flex items-center gap-2 mt-1 text-[12px] font-semibold ${palette.text} break-all`}>
                    <Icon name="link" size={13} className={palette.icon} /> {item.instrumentUrl}
                  </a>
                </div>
              )}
            </div>
          </div>
          <div className="print-only p-3">
            <p className={`text-[13px] font-semibold leading-snug ${palette.text}`}>{item.name}</p>
            <p className="text-[13px] leading-relaxed text-gray-700 mt-2">{item.description}</p>
            {item.referenceUrl && <p className="text-[11px] text-gray-500 mt-2">{item.referenceUrl}</p>}
            {item.instrumentUrl && <p className="text-[11px] text-gray-500 mt-1">{item.instrumentLabel || "Instrument Link:"} {item.instrumentUrl}</p>}
          </div>
        </div>
      );
    };

    const App = () => {
      const [selectedOutcomes, setSelectedOutcomes] = useState([]);
      const [view, setView] = useState("selection");

      const toggleOutcome = (id) => {
        setSelectedOutcomes((prev) => prev.includes(id) ? prev.filter((i) => i !== id) : [...prev, id]);
      };

      const getSelectedData = useMemo(() => FRAMEWORK_DATA.filter((o) => selectedOutcomes.includes(o.id)), [selectedOutcomes]);

      const SelectionView = () => (
        <div className="space-y-4 animate-in">
          <div className="bg-white p-6 rounded-xl border border-gray-200 shadow-sm mb-6">
            <h2 className="text-gray-900 font-bold flex items-center gap-2 mb-4">
              <Icon name="info" size={18} className="text-blue-600" /> Framework Instructions
            </h2>
            <div className="grid md:grid-cols-3 gap-6 text-sm">
              <div className="p-3 bg-emerald-50 rounded-lg border border-emerald-100">
                <h3 className="font-bold text-emerald-800 flex items-center gap-1.5 mb-1">
                  <div className="w-2 h-2 rounded-full bg-emerald-500" /> Design-Focused
                </h3>
                <p className="text-emerald-700 leading-relaxed">
                  Outcomes related to intervention design. These are <strong>directly measurable</strong> in mid-design evaluation for refinement.
                </p>
              </div>
              <div className="p-3 bg-purple-50 rounded-lg border border-purple-100">
                <h3 className="font-bold text-purple-800 flex items-center gap-1.5 mb-1">
                  <div className="w-2 h-2 rounded-full bg-purple-500" /> Transitionary
                </h3>
                <p className="text-purple-700 leading-relaxed">
                  <strong>Adoption</strong> serves as the bridge between design and deployment, measuring psychological readiness and early uptake conditions.
                </p>
              </div>
              <div className="p-3 bg-slate-100 rounded-lg border border-slate-200">
                <h3 className="font-bold text-slate-800 flex items-center gap-1.5 mb-1">
                  <div className="w-2 h-2 rounded-full bg-slate-500" /> Strategy-Focused
                </h3>
                <p className="text-slate-700 leading-relaxed">
                  Outcomes related to implementation and maintenance. Used for <strong>exploratory consideration</strong> during mid-design.
                </p>
              </div>
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {FRAMEWORK_DATA.map((outcome) => (
              <button
                key={outcome.id}
                onClick={() => toggleOutcome(outcome.id)}
                className={`p-4 rounded-xl border-2 text-left transition-all relative group ${
                  selectedOutcomes.includes(outcome.id)
                    ? outcome.type === "design"
                      ? "border-emerald-500 bg-emerald-50 ring-2 ring-emerald-100"
                      : outcome.type === "transitionary"
                        ? "border-purple-500 bg-purple-50 ring-2 ring-purple-100"
                        : "border-slate-600 bg-slate-50 ring-2 ring-slate-100"
                    : "border-gray-200 bg-white hover:border-gray-300 shadow-sm"
                }`}
              >
                <div className="flex justify-between items-start gap-3">
                  <h3 className="font-bold text-lg">{outcome.title}</h3>
                  {selectedOutcomes.includes(outcome.id) && (
                    <Icon
                      name="check-circle-2"
                      size={20}
                      className={outcome.type === "design" ? "text-emerald-600" : outcome.type === "transitionary" ? "text-purple-600" : "text-slate-600"}
                    />
                  )}
                </div>
                <p className="text-sm text-gray-600 mt-1 leading-relaxed italic">{outcome.definition}</p>
                <div className="flex items-center gap-2 mt-4">
                  <span className={`px-2 py-0.5 text-[10px] rounded uppercase font-bold tracking-wider ${
                    outcome.type === "design" ? "bg-emerald-200 text-emerald-800" : outcome.type === "transitionary" ? "bg-purple-200 text-purple-800" : "bg-slate-700 text-white"
                  }`}>
                    {measureLabel(outcome.type)}
                  </span>
                </div>
              </button>
            ))}
          </div>
        </div>
      );

      const StakeholderView = () => (
        <div className="space-y-6 animate-in">
          <div>
            <h2 className="text-2xl font-bold">Stakeholders Required to Evaluate</h2>
            <p className="text-gray-600">Gather perspectives from key stakeholder groups identified in the framework.</p>
          </div>
          <div className="space-y-4">
            {getSelectedData.map((outcome) => {
              const tone = colorStyles[outcome.type];
              return (
                <div key={outcome.id} className={`bg-white rounded-xl border shadow-sm overflow-hidden ${tone.card}`}>
                  <div className={`px-4 py-2 border-b flex items-center justify-between ${tone.header}`}>
                    <div className="flex items-center gap-2">
                      <div className={`w-3 h-3 rounded-sm ${tone.solid}`} />
                      <span className={`font-bold text-sm uppercase tracking-tight ${tone.accent}`}>{outcome.title}</span>
                    </div>
                    <span className={`text-[10px] px-2 py-0.5 rounded font-bold ${tone.badge}`}>{outcome.stakeholders.length} Roles Required</span>
                  </div>
                  <div className="divide-y divide-gray-100 grid grid-cols-1 md:grid-cols-2">
                    {outcome.stakeholders.map((s, idx) => (
                      <div key={idx} className="p-3 flex items-center gap-3 text-sm font-medium text-gray-700 bg-white">
                        <div className={`w-1.5 h-1.5 rounded-full ${tone.solid}`} />
                        {s}
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );

      const EvaluationKitView = () => (
        <div className="space-y-8 animate-in">
          <div className="flex justify-between items-center print:hidden">
            <div>
              <h2 className="text-2xl font-bold">Evaluation Kit</h2>
              <p className="text-sm text-gray-500">Resource guide and full protocol mapping interview topics, sample questions, strategies, and references.</p>
            </div>
            <button onClick={() => window.print()} className="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-indigo-700 flex items-center gap-2 shadow-sm transition-colors">
              <Icon name="file-text" size={16} /> Print/Export PDF
            </button>
          </div>

          <div className="print-front-page print-only border-b-2 border-gray-900 pb-6">
            <h1 className="text-3xl font-black tracking-tight">Mid-Design Evaluation Framework</h1>
            <p className="text-gray-700 mt-3 text-sm leading-relaxed max-w-4xl">
              This Mid-Design Implementation Evaluation Framework is a structured decision-support tool developed to assess key implementation outcomes of medical intervention innovations before full-scale implementation. The framework evaluates feasibility, acceptability, appropriateness, adoption, implementation cost, fidelity, penetration, and sustainability. The purpose is to identify potential implementation barriers, integration challenges, and resource demands during early or mid-stage design, thereby supporting proactive refinement before clinical rollout.
            </p>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-8">
              <div className="border border-gray-300 rounded-xl p-4">
                <h3 className="font-bold text-sm uppercase tracking-wide">Design-Focused</h3>
                <p className="text-sm text-gray-700 mt-2">Lighter-coded outcomes relate to how the intervention itself is designed and are more directly measurable in mid-design evaluation.</p>
              </div>
              <div className="border border-gray-300 rounded-xl p-4">
                <h3 className="font-bold text-sm uppercase tracking-wide">Transitionary</h3>
                <p className="text-sm text-gray-700 mt-2">Adoption bridges design and deployment by capturing willingness, early uptake conditions, and decision readiness.</p>
              </div>
              <div className="border border-gray-300 rounded-xl p-4">
                <h3 className="font-bold text-sm uppercase tracking-wide">Strategy-Focused</h3>
                <p className="text-sm text-gray-700 mt-2">Darker-coded outcomes relate to implementation strategy and maintenance. They are less direct in mid-design, but useful as exploratory considerations.</p>
              </div>
            </div>
          </div>

          {getSelectedData.map((outcome) => {
            const tone = colorStyles[outcome.type];
            return (
              <section key={outcome.id} className={`print-page bg-white rounded-xl border-2 overflow-hidden shadow-sm ${tone.card}`}>
                <div className={`p-4 border-b flex justify-between items-center ${tone.header}`}>
                  <div>
                    <p className="text-[10px] font-black uppercase tracking-widest text-gray-500">Implementation Outcome</p>
                    <h3 className="font-bold text-2xl text-gray-900">{outcome.title}</h3>
                    <p className="text-sm text-gray-600 mt-1 max-w-4xl leading-relaxed">{outcome.definition}</p>
                  </div>
                  <span className={`px-2 py-1 text-[10px] rounded uppercase font-bold border ${tone.pill}`}>
                    {typeLabel(outcome.type)}
                  </span>
                </div>

                <div className="p-5 grid grid-cols-1 md:grid-cols-12 gap-6">
                  <div className="md:col-span-3">
                    <h4 className={`text-[10px] font-black uppercase tracking-widest mb-3 flex items-center gap-1 ${tone.accent}`}>
                      <Icon name="users" size={12} /> Stakeholders
                    </h4>
                    <div className="space-y-2">
                      {outcome.stakeholders.map((s, idx) => (
                        <div key={idx} className="flex items-start gap-2 text-[13px] font-semibold text-gray-800 leading-tight">
                          <div className={`min-w-[4px] h-4 rounded-full mt-0.5 ${tone.solid}`} />
                          {s}
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="md:col-span-5 border-l border-gray-100 pl-0 md:pl-5">
                    <h4 className="text-[10px] font-black text-blue-700 uppercase tracking-widest mb-3 flex items-center gap-1">
                      <Icon name="help-circle" size={12} /> Interview Topics and Sample Questions
                    </h4>
                    <div className="space-y-3">
                      {outcome.topics.map((topic, i) => <TopicAccordion key={i} topic={topic} tone={outcome.type} />)}
                    </div>
                  </div>

                  <div className="md:col-span-4 border-l border-gray-100 pl-0 md:pl-5">
                    <h4 className="text-[10px] font-black text-purple-700 uppercase tracking-widest mb-3 flex items-center gap-1">
                      <Icon name="clipboard-check" size={12} /> Evaluation Strategies
                    </h4>
                    <div className="space-y-3">
                      <div>
                        <p className="text-[10px] font-bold text-gray-400 uppercase mb-2">Instruments</p>
                        <div className="space-y-3">
                          {outcome.strategies.map((s, i) => <StrategyAccordion key={i} item={s} color="purple" />)}
                        </div>
                      </div>

                      {outcome.altEvidence && (
                        <div>
                          <p className="text-[10px] font-bold text-gray-400 uppercase mb-2">Observation/Reviews</p>
                          <div className="space-y-3">
                            {outcome.altEvidence.map((ae, i) => <StrategyAccordion key={i} item={ae} color="indigo" />)}
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </section>
            );
          })}

          <section className="print-page bg-white rounded-xl border border-gray-200 shadow-sm p-6">
            <div className="border-b border-gray-200 pb-3 mb-4">
              <h2 className="text-2xl font-bold">References</h2>
              <p className="text-sm text-gray-500 mt-1">Full reference list used in the field kit.</p>
            </div>
            <div className="space-y-3 text-[13px] leading-relaxed text-gray-800">
              {REFERENCES.map((ref, idx) => (
                <p key={idx}><span className="font-semibold mr-2">{idx + 1}.</span>{ref}</p>
              ))}
            </div>
          </section>
        </div>
      );

      return (
        <div className="min-h-screen bg-gray-50 text-gray-900 p-4 md:p-8">
          <div className="max-w-6xl mx-auto">
            <header className="mb-10 text-center print:hidden">
              <h1 className="text-3xl font-black tracking-tight text-gray-900 md:text-4xl">Mid-Design Evaluation Tool</h1>
              <p className="text-gray-500 mt-2 font-medium">
                A structured decision-support tool to proactively assess implementation outcomes and refine medical innovations before full-scale rollout. <br />@Chuwen Zheng
              </p>
            </header>

            <div className="flex bg-white p-1 rounded-xl shadow-sm border border-gray-200 mb-8 sticky top-4 z-10 overflow-x-auto print:hidden">
              <button onClick={() => setView("selection")} className={`flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all min-w-[120px] ${view === "selection" ? "bg-indigo-600 text-white shadow-md" : "text-gray-500 hover:bg-gray-100"}`}>
                <Icon name="settings" size={18} /> 1. Outcomes
              </button>
              <button disabled={selectedOutcomes.length === 0} onClick={() => setView("stakeholders")} className={`flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all min-w-[120px] ${view === "stakeholders" ? "bg-indigo-600 text-white shadow-md" : "text-gray-500 hover:bg-gray-100 disabled:opacity-30"}`}>
                <Icon name="users" size={18} /> 2. Stakeholders
              </button>
              <button disabled={selectedOutcomes.length === 0} onClick={() => setView("fieldkit")} className={`flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all min-w-[120px] ${view === "fieldkit" ? "bg-indigo-600 text-white shadow-md" : "text-gray-500 hover:bg-gray-100 disabled:opacity-30"}`}>
                <Icon name="clipboard-check" size={18} /> 3. Field Kit
              </button>
            </div>

            <main className="mb-32">
              {view === "selection" && <SelectionView />}
              {view === "stakeholders" && <StakeholderView />}
              {view === "fieldkit" && <EvaluationKitView />}
            </main>

            <footer className="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t border-gray-200 flex justify-center z-20 print:hidden">
              <div className="max-w-5xl w-full flex justify-between items-center">
                <div className="hidden md:block"><p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Full-Framework Integrated (V2.0)</p></div>
                <div className="flex gap-4 w-full md:w-auto">
                  {view !== "selection" && (
                    <button onClick={() => setView(view === "fieldkit" ? "stakeholders" : "selection")} className="flex-1 md:flex-none border border-gray-300 text-gray-700 px-6 py-2 rounded-full font-bold hover:bg-gray-50 transition-colors">Back</button>
                  )}
                  {view !== "fieldkit" && (
                    <button disabled={selectedOutcomes.length === 0} onClick={() => setView(view === "selection" ? "stakeholders" : "fieldkit")} className="flex-1 md:flex-none bg-indigo-600 text-white px-8 py-2 rounded-full flex items-center justify-center gap-2 font-bold disabled:opacity-50 transition-all hover:bg-indigo-700 shadow-lg shadow-indigo-200">
                      {view === "selection" ? "Review Stakeholders" : "Generate Field Kit"} <Icon name="chevron-right" size={18} />
                    </button>
                  )}
                </div>
              </div>
            </footer>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
