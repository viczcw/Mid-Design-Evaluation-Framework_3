<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mid-Design Evaluation Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }

        @media print {
            .print\:hidden { display: none !important; }
            .print\:block { display: block !important; }
            .print\:border-none { border: none !important; }
            .print\:p-0 { padding: 0 !important; }
            .print\:bg-transparent { background: transparent !important; }
            body { background: white; }
        }

        .animate-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            const ref = React.useRef(null);
            useEffect(() => {
                if (ref.current) {
                    lucide.createIcons({
                        targets: [ref.current]
                    });
                }
            }, [name]);

            return <i ref={ref} data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        const FRAMEWORK_DATA = [
            {
                id: "feasibility",
                title: "Feasibility",
                type: "design",
                definition: "The extent to which a new treatment, or an innovation, can be successfully used or carried out within a given agency or setting.",
                stakeholders: [
                    "Technical experts (i.e., those who can assess the technical feasibility of the intervention)", 
                    "Future implementers of the intervention (i.e., those who will support eventual implementation)", 
                    "Future users of the intervention (e.g., clinicians)"
                ],
                topics: [
                    "Practical capability for carrying out the design",
                    "Resource availability (e.g., time, staffing, equipment, infrastructure)",
                    "Training and skill sufficiency",
                    "Competing demands and capacity constraints",
                    "Ease or difficulty of execution in routine practice",
                    "Perceived implementation burden"
                ],
                strategies: [
                    { name: "Survey: Feasibility of Intervention Measure (FIM)", url: "https://doi.org/10.1186/s13012-017-0635-3" },
                    { name: "Survey: Readiness Thinking Tool", url: "https://doi.org/10.1177/15248399221080096" },
                    { name: "Observation Guide: Readiness Thinking Tool", url: "https://doi.org/10.1177/15248399221080096" }
                ],
            },
            {
                id: "acceptability",
                title: "Acceptability",
                type: "design",
                definition: "The perception among implementation stakeholders that a given treatment, service, practice, or innovation is agreeable, palatable, or satisfactory.",
                stakeholders: [
                    "Technical experts", 
                    "Subject matter experts (SMEs)", 
                    "Future implementers", 
                    "Future users (e.g., clinicians)",
                    "Future beneficiaries (e.g., patients)"
                ],
                topics: [
                    "Overall satisfaction",
                    "Emotional reactions",
                    "Perceived comfort",
                    "Alignment with personal preferences",
                    "Willingness for engagement",
                    "Perceived advantages",
                    "Trust and confidence"
                ],
                strategies: [
                    { name: "Survey: Acceptability of Intervention Measure (AIM)", url: "https://doi.org/10.1186/s13012-017-0635-3" },
                    { name: "Survey: Technology Acceptance Model (TAM)", url: "https://doi.org/10.1055/s-0038-1668091" }
                ],
            },
            {
                id: "appropriateness",
                title: "Appropriateness",
                type: "design",
                definition: "The perceived fit, relevance, or compatibility of the innovation for a given practice setting, provider, or consumer; and/or perceived fit to address a particular issue.",
                stakeholders: [
                    "Subject matter experts (SMEs)", 
                    "Future implementers", 
                    "Future users (e.g., clinicians)",
                    "Future beneficiaries (e.g., patients)"
                ],
                topics: [
                    "Relevance to the clinical problem or population",
                    "Compatibility with organizational missions or values",
                    "Fit within existing clinical models or standards of care",
                    "Perceived effectiveness for addressing the targeted issue",
                    "Suitability for the local practice environment",
                    "Congruence with stakeholder expectations",
                    "Perceived necessity for the problem at hand"
                ],
                strategies: [
                    { name: "Survey: Intervention Appropriateness Measure (IAM)", url: "https://doi.org/10.1186/s13012-017-0635-3" }
                ],
                altEvidence: [
                    { name: "Field Observation: Pre-PRO integration framework", icon: "eye", url: "https://doi.org/10.1186/s43058-026-00859-5" },
                ],
            },
            {
                id: "adoption",
                title: "Adoption",
                type: "transitionary",
                definition: "The intention, initial decision, or action to try or employ an innovation or evidence-based practice.",
                stakeholders: [
                    "Future users (e.g., clinicians)", 
                    "Future beneficiaries (e.g., patients)", 
                    "Organizational decision-makers (procurement)",
                    "Financial decision-makers (budget officers)"
                ],
                topics: [
                    "Perceived relative advantage of the intervention",
                    "Compatibility with current workflow",
                    "Perceived complexity or burden",
                    "Resource requirements",
                    "Organizational readiness",
                    "Social and professional norms",
                    "Conditions for approval or rejection",
                    "Willingness to trial the intervention"
                ],
                strategies: [
                    { name: "Survey: Multi-level forecasting measures", url: "https://doi.org/10.1007/s10488-014-0551-7" }
                ],
            },
            {
                id: "implementation_cost",
                title: "Implementation Cost",
                type: "strategy",
                definition: "The cost impact of an implementation effort... depends upon the costs of the particular intervention, the strategy used, and the location of service delivery.",
                stakeholders: [
                    "Organizational-level decision-makers", 
                    "Management team (unit managers)", 
                    "Front-line users (clinicians, nurses)",
                    "Future beneficiaries (patients)",
                    "Policy/economic environment stakeholders"
                ],
                topics: [
                    "Expected workflow changes",
                    "Training burden and frequency",
                    "Required staffing shifts",
                    "IT/Infrastructure changes",
                    "Maintenance requirements",
                    "Competing initiatives",
                    "Opportunity cost"
                ],
                strategies: [
                    { name: "Local-level economic evaluation framework", url: "https://doi.org/10.1017/S0266462323002775" },
                    { name: "Survey: Stage-Based Cost Projection (SIC/COINS)", url: "https://doi.org/10.1016/j.childyouth.2013.10.006" }
                ],
                altEvidence: [
                    { name: "Document Evidence Review (Budgets, Wage scales, FTE maps)", icon: "file-text", url: "#" },
                ],
            },
            {
                id: "fidelity",
                title: "Fidelity",
                type: "strategy",
                definition: "The degree to which an intervention was implemented as it was prescribed in the original protocol or as intended by developers.",
                stakeholders: [
                    "Senior leadership (Exec sponsors, CMO)", 
                    "Mid-level operational managers (Quality directors)", 
                    "Front-line users (clinicians, nurses)",
                    "Future beneficiaries (patients)"
                ],
                topics: [
                    "Adherence to core components",
                    "Dose and reach",
                    "Adaptations and modifications",
                    "Barriers to protocol adherence",
                    "Delivery expectations",
                    "Differentiation from existing practice"
                ],
                strategies: [
                    { name: "Survey: IPS Fidelity Scales", url: "https://doi.org/10.1176/appi.ps.201100476" }
                ],
                altEvidence: [
                    { name: "Field Observation: Fidelity Rating System (FIMP)", icon: "eye", url: "https://doi.org/10.1016/S0005-7894(05)80049-8" },
                ],
            },
            {
                id: "penetration",
                title: "Penetration",
                type: "strategy",
                definition: "The integration of a practice within a service setting and its subsystems, intrinsically linked to context.",
                stakeholders: [
                    "Senior leadership (Service line directors)", 
                    "Mid-level operational managers", 
                    "Financial decision-makers",
                    "Clinical leadership (Governance leads)",
                    "Infrastructure personnel (IT, Informatics, EMR)",
                    "Front-line users"
                ],
                topics: [
                    "Barriers and facilitators",
                    "Contextual conditions",
                    "Equity considerations",
                    "Implementation infrastructure",
                    "Interdepartmental coordination",
                    "Sustainment factors",
                    "Policy alignment and misalignment"
                ],
                strategies: [
                    { name: "Survey: NoMAD Questionnaire", url: "https://doi.org/10.1186/s12874-018-0590-y" },
                    { name: "Survey: Pragmatic Context Assessment Tool (pCAT)", url: "https://doi.org/10.1186/s43058-022-00380-5" }
                ],
                altEvidence: [
                    { name: "Interview Coding Guide: NPT Guide", icon: "code", url: "https://doi.org/10.1186/1748-5908-8-43" },
                ],
            },
            {
                id: "sustainability",
                title: "Sustainability",
                type: "strategy",
                definition: "The extent to which a newly implemented treatment is maintained or institutionalized within ongoing, stable operations.",
                stakeholders: [
                    "Senior leadership", 
                    "Mid-level operational managers", 
                    "Financial decision-makers",
                    "Clinical leadership",
                    "Implementation infrastructure personnel (IT/Data)",
                    "Front-line users"
                ],
                topics: [
                    "Strategic alignment",
                    "Financial institutionalization",
                    "Role formalization",
                    "Infrastructure & data systems",
                    "Staffing continuity",
                    "Training and knowledge transfer",
                    "Adaptability of the intervention",
                    "Maintenance and leadership continuity"
                ],
                strategies: [
                    { name: "Survey: PRISM Infrastructure Assessment", url: "https://doi.org/10.1016/S1553-7250(08)34030-6" }
                ],
                altEvidence: [
                    { name: "Document Evidence Review (SOPs, Policy drafts, Staffing plans)", icon: "file-text", url: "#" },
                ],
            },
        ];

        const App = () => {
            const [selectedOutcomes, setSelectedOutcomes] = useState([]);
            const [view, setView] = useState("selection");

            const toggleOutcome = (id) => {
                setSelectedOutcomes((prev) =>
                    prev.includes(id) ? prev.filter((i) => i !== id) : [...prev, id]
                );
            };

            const getSelectedData = () =>
                FRAMEWORK_DATA.filter((o) => selectedOutcomes.includes(o.id));

            const SelectionView = () => (
                <div className="space-y-4 animate-in">
                    <div className="bg-white p-6 rounded-xl border border-gray-200 shadow-sm mb-6">
                        <h2 className="text-gray-900 font-bold flex items-center gap-2 mb-4">
                            <Icon name="info" size={18} className="text-blue-600" /> Framework Instructions
                        </h2>
                        <div className="grid md:grid-cols-3 gap-6 text-sm">
                            <div className="p-3 bg-emerald-50 rounded-lg border border-emerald-100">
                                <h3 className="font-bold text-emerald-800 flex items-center gap-1.5 mb-1">
                                    <div className="w-2 h-2 rounded-full bg-emerald-500" />
                                    Design-Focused
                                </h3>
                                <p className="text-emerald-700 leading-relaxed">
                                    Outcomes related to intervention design. These are <strong>directly measurable</strong> in mid-design evaluation for refinement.
                                </p>
                            </div>

                            <div className="p-3 bg-purple-50 rounded-lg border border-purple-100">
                                <h3 className="font-bold text-purple-800 flex items-center gap-1.5 mb-1">
                                    <div className="w-2 h-2 rounded-full bg-purple-500" />
                                    Transitionary
                                </h3>
                                <p className="text-purple-700 leading-relaxed">
                                    <strong>Adoption</strong> serves as the bridge between "design" and "deployment," measuring the psychological readiness of stakeholders.
                                </p>
                            </div>

                            <div className="p-3 bg-slate-100 rounded-lg border border-slate-200">
                                <h3 className="font-bold text-slate-800 flex items-center gap-1.5 mb-1">
                                    <div className="w-2 h-2 rounded-full bg-slate-500" />
                                    Strategy-Focused
                                </h3>
                                <p className="text-slate-700 leading-relaxed">
                                    Outcomes related to implementation and maintenance. Used for <strong>exploratory consideration</strong> during mid-design.
                                </p>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {FRAMEWORK_DATA.map((outcome) => (
                            <button
                                key={outcome.id}
                                onClick={() => toggleOutcome(outcome.id)}
                                className={`p-4 rounded-xl border-2 text-left transition-all relative group ${
                                    selectedOutcomes.includes(outcome.id)
                                        ? outcome.type === "design"
                                            ? "border-emerald-500 bg-emerald-50 ring-2 ring-emerald-100"
                                            : outcome.type === "transitionary"
                                                ? "border-purple-500 bg-purple-50 ring-2 ring-purple-100"
                                                : "border-slate-600 bg-slate-50 ring-2 ring-slate-100"
                                        : "border-gray-200 bg-white hover:border-gray-300 shadow-sm"
                                }`}
                            >
                                <div className="flex justify-between items-start">
                                    <h3 className="font-bold text-lg">{outcome.title}</h3>
                                    {selectedOutcomes.includes(outcome.id) && (
                                        <Icon 
                                            name="check-circle-2" 
                                            size={20} 
                                            className={
                                                outcome.type === "design" ? "text-emerald-600" : 
                                                outcome.type === "transitionary" ? "text-purple-600" : "text-slate-600"
                                            } 
                                        />
                                    )}
                                </div>
                                <p className="text-sm text-gray-600 mt-1 line-clamp-2 leading-relaxed italic">
                                    {outcome.definition}
                                </p>
                                <div className="flex items-center gap-2 mt-4">
                                    <span className={`px-2 py-0.5 text-[10px] rounded uppercase font-bold tracking-wider ${
                                        outcome.type === "design" ? "bg-emerald-200 text-emerald-800" : 
                                        outcome.type === "transitionary" ? "bg-purple-200 text-purple-800" : "bg-slate-700 text-white"
                                    }`}>
                                        {outcome.type === "design" ? "Direct Measure" : 
                                         outcome.type === "transitionary" ? "Bridge Measure" : "Exploratory"}
                                    </span>
                                </div>
                            </button>
                        ))}
                    </div>
                </div>
            );

            const StakeholderView = () => (
                <div className="space-y-6 animate-in">
                    <div>
                        <h2 className="text-2xl font-bold">Stakeholders Required to Evaluate</h2>
                        <p className="text-gray-600">Gather perspectives from key stakeholder groups identified in the framework:</p>
                    </div>
                    <div className="space-y-4">
                        {getSelectedData().map((outcome) => (
                            <div key={outcome.id} className={`bg-white rounded-xl border shadow-sm overflow-hidden ${
                                outcome.type === "design" ? "border-emerald-200" : 
                                outcome.type === "transitionary" ? "border-purple-200" : "border-slate-300"
                            }`}>
                                <div className={`px-4 py-2 border-b flex items-center justify-between ${
                                    outcome.type === "design" ? "bg-emerald-50 border-emerald-100" : 
                                    outcome.type === "transitionary" ? "bg-purple-50 border-purple-100" : "bg-slate-100 border-slate-200"
                                }`}>
                                    <div className="flex items-center gap-2">
                                        <div className={`w-3 h-3 rounded-sm ${
                                            outcome.type === "design" ? "bg-emerald-500" : 
                                            outcome.type === "transitionary" ? "bg-purple-500" : "bg-slate-600"
                                        }`} />
                                        <span className={`font-bold text-sm uppercase tracking-tight ${
                                            outcome.type === "design" ? "text-emerald-900" : 
                                            outcome.type === "transitionary" ? "text-purple-900" : "text-slate-900"
                                        }`}>{outcome.title}</span>
                                    </div>
                                    <span className={`text-[10px] px-2 py-0.5 rounded font-bold ${
                                        outcome.type === "design" ? "bg-emerald-200 text-emerald-800" : 
                                        outcome.type === "transitionary" ? "bg-purple-200 text-purple-800" : "bg-slate-700 text-white"
                                    }`}>
                                        {outcome.stakeholders.length} Roles Required
                                    </span>
                                </div>
                                <div className="divide-y divide-gray-100 grid grid-cols-1 md:grid-cols-2">
                                    {outcome.stakeholders.map((s, idx) => (
                                        <div key={idx} className="p-3 flex items-center gap-3 text-sm font-medium text-gray-700 bg-white">
                                            <div className={`w-1.5 h-1.5 rounded-full ${
                                                outcome.type === "design" ? "bg-emerald-400" : 
                                                outcome.type === "transitionary" ? "bg-purple-400" : "bg-slate-400"
                                            }`} />
                                            {s}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const EvaluationKitView = () => (
                <div className="space-y-8 animate-in">
                    <div className="flex justify-between items-center print:hidden">
                        <div>
                            <h2 className="text-2xl font-bold">Evaluation Kit</h2>
                            <p className="text-sm text-gray-500">Resource guide and protocols mapping all PDF topics to digital resources.</p>
                        </div>
                        <button onClick={() => window.print()} className="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-indigo-700 flex items-center gap-2 shadow-sm transition-colors">
                            <Icon name="file-text" size={16} /> Print/Export PDF
                        </button>
                    </div>

                    <div className="hidden print:block mb-8 border-b-2 border-gray-900 pb-4">
                        <h1 className="text-3xl font-black">Implementation Evaluation Protocols</h1>
                        <p className="text-gray-600 mt-1">Full Content Mapping: Mid-Design Framework (V1.0 IRB-Ready)</p>
                    </div>

                    {getSelectedData().map((outcome) => (
                        <div key={outcome.id} className={`bg-white rounded-xl border-2 overflow-hidden shadow-sm mb-10 break-inside-avoid ${
                            outcome.type === "design" ? "border-emerald-100" : 
                            outcome.type === "transitionary" ? "border-purple-100" : "border-slate-200"
                        }`}>
                            <div className={`p-4 border-b flex justify-between items-center ${
                                outcome.type === "design" ? "bg-emerald-50 border-emerald-100" : 
                                outcome.type === "transitionary" ? "bg-purple-50 border-purple-100" : "bg-slate-100 border-slate-200"
                            }`}>
                                <div>
                                    <p className="text-[10px] font-black uppercase tracking-widest text-gray-500">Outcome Protocol</p>
                                    <h3 className="font-bold text-2xl text-gray-900">{outcome.title}</h3>
                                </div>
                                <span className={`px-2 py-1 text-[10px] rounded uppercase font-bold border ${
                                    outcome.type === "design" ? "bg-white border-emerald-200 text-emerald-700" : 
                                    outcome.type === "transitionary" ? "bg-white border-purple-200 text-purple-700" : "bg-slate-700 border-slate-700 text-white"
                                }`}>
                                    {outcome.type === "design" ? "Design Focused" : 
                                     outcome.type === "transitionary" ? "Transitionary" : "Strategy Focused"}
                                </span>
                            </div>

                            <div className="p-6 grid grid-cols-1 md:grid-cols-12 gap-8">
                                <div className="md:col-span-3">
                                    <h4 className={`text-[10px] font-black uppercase tracking-widest mb-3 flex items-center gap-1 ${
                                        outcome.type === "design" ? "text-emerald-700" : 
                                        outcome.type === "transitionary" ? "text-purple-700" : "text-slate-700"
                                    }`}>
                                        <Icon name="users" size={12} /> Stakeholders
                                    </h4>
                                    <div className="space-y-2">
                                        {outcome.stakeholders.map((s, idx) => (
                                            <div key={idx} className="flex items-start gap-2 text-[13px] font-bold text-gray-800 leading-tight">
                                                <div className={`min-w-[4px] h-4 rounded-full mt-0.5 ${
                                                    outcome.type === "design" ? "bg-emerald-400" : 
                                                    outcome.type === "transitionary" ? "bg-purple-400" : "bg-slate-400"
                                                }`} />
                                                {s}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="md:col-span-5 border-l border-gray-100 pl-0 md:pl-6">
                                    <h4 className="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-3 flex items-center gap-1">
                                        <Icon name="help-circle" size={12} /> Interview Topics (Full List)
                                    </h4>
                                    <ul className="space-y-2">
                                        {outcome.topics.map((t, i) => (
                                            <li key={i} className="flex gap-2 text-sm text-gray-700 italic leading-snug">
                                                <div className="min-w-1.5 h-1.5 rounded-full bg-blue-300 mt-1.5" />
                                                "{t}"
                                            </li>
                                        ))}
                                    </ul>
                                </div>

                                <div className="md:col-span-4 border-l border-gray-100 pl-0 md:pl-6">
                                    <h4 className="text-[10px] font-black text-purple-700 uppercase tracking-widest mb-3 flex items-center gap-1">
                                        <Icon name="clipboard-check" size={12} /> Evaluation Strategies
                                    </h4>
                                    <div className="space-y-3">
                                        <div>
                                            <p className="text-[10px] font-bold text-gray-400 uppercase mb-2">Instruments</p>
                                            {outcome.strategies.map((s, i) => (
                                                <a key={i} href={s.url} target="_blank" rel="noopener noreferrer" className="bg-purple-50 text-purple-900 p-2 rounded text-[12px] font-medium flex items-center justify-between gap-2 border border-purple-100 hover:bg-purple-100 transition-colors group mb-2 print:border-none print:p-0 print:bg-transparent">
                                                    <div className="flex items-center gap-2">
                                                        <Icon name="file-text" size={13} className="opacity-70 print:hidden text-purple-600" /> {s.name}
                                                    </div>
                                                    <Icon name="external-link" size={13} className="opacity-0 group-hover:opacity-100 transition-opacity print:hidden text-purple-400" />
                                                </a>
                                            ))}
                                        </div>
                                        {outcome.altEvidence && (
                                            <div>
                                                <p className="text-[10px] font-bold text-gray-400 uppercase mb-2">Observation/Reviews</p>
                                                {outcome.altEvidence.map((ae, i) => (
                                                    <a key={i} href={ae.url} target="_blank" rel="noopener noreferrer" className="bg-indigo-50 text-indigo-900 p-2 rounded text-[12px] font-medium flex items-center justify-between gap-2 border border-indigo-100 hover:bg-indigo-100 transition-colors group print:bg-transparent print:p-0 print:border-none">
                                                        <div className="flex items-center gap-2">
                                                            <span className="print:hidden text-indigo-500"><Icon name={ae.icon} size={13} /></span> {ae.name}
                                                        </div>
                                                        {ae.url !== "#" && <Icon name="external-link" size={13} className="opacity-0 group-hover:opacity-100 transition-opacity print:hidden text-indigo-400" />}
                                                    </a>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            );

            return (
                <div className="min-h-screen bg-gray-50 text-gray-900 p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">
                        <header className="mb-10 text-center print:hidden">
                            <h1 className="text-3xl font-black tracking-tight text-gray-900 md:text-4xl">Mid-Design Evaluation Tool</h1>
                            <p className="text-gray-500 mt-2 font-medium">
                                A structured decision-support tool to proactively assess implementation outcomes and refine medical innovations before full-scale rollout. <br />@Chuwen Zheng
                            </p>
                        </header>

                        <div className="flex bg-white p-1 rounded-xl shadow-sm border border-gray-200 mb-8 sticky top-4 z-10 overflow-x-auto print:hidden">
                            <button onClick={() => setView("selection")} className={`flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all min-w-[120px] ${view === "selection" ? "bg-indigo-600 text-white shadow-md" : "text-gray-500 hover:bg-gray-100"}`}>
                                <Icon name="settings" size={18} /> 1. Outcomes
                            </button>
                            <button disabled={selectedOutcomes.length === 0} onClick={() => setView("stakeholders")} className={`flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all min-w-[120px] ${view === "stakeholders" ? "bg-indigo-600 text-white shadow-md" : "text-gray-500 hover:bg-gray-100 disabled:opacity-30"}`}>
                                <Icon name="users" size={18} /> 2. Stakeholders
                            </button>
                            <button disabled={selectedOutcomes.length === 0} onClick={() => setView("fieldkit")} className={`flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold transition-all min-w-[120px] ${view === "fieldkit" ? "bg-indigo-600 text-white shadow-md" : "text-gray-500 hover:bg-gray-100 disabled:opacity-30"}`}>
                                <Icon name="clipboard-check" size={18} /> 3. Field Kit
                            </button>
                        </div>

                        <main className="mb-32">
                            {view === "selection" && <SelectionView />}
                            {view === "stakeholders" && <StakeholderView />}
                            {view === "fieldkit" && <EvaluationKitView />}
                        </main>

                        <footer className="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t border-gray-200 flex justify-center z-20 print:hidden">
                            <div className="max-w-5xl w-full flex justify-between items-center">
                                <div className="hidden md:block"><p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Full-Framework Integrated (V1.0)</p></div>
                                <div className="flex gap-4 w-full md:w-auto">
                                    {view !== "selection" && (
                                        <button onClick={() => setView(view === "fieldkit" ? "stakeholders" : "selection")} className="flex-1 md:flex-none border border-gray-300 text-gray-700 px-6 py-2 rounded-full font-bold hover:bg-gray-50 transition-colors">Back</button>
                                    )}
                                    {view !== "fieldkit" && (
                                        <button disabled={selectedOutcomes.length === 0} onClick={() => setView(view === "selection" ? "stakeholders" : "fieldkit")} className="flex-1 md:flex-none bg-indigo-600 text-white px-8 py-2 rounded-full flex items-center justify-center gap-2 font-bold disabled:opacity-50 transition-all hover:bg-indigo-700 shadow-lg shadow-indigo-200">
                                            {view === "selection" ? "Review Stakeholders" : "Generate Field Kit"} <Icon name="chevron-right" size={18} />
                                        </button>
                                    )}
                                </div>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
