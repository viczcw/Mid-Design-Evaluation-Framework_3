    body {

    }

    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

        opacity: 1;
        transform: translateY(0);
      }

    .avoid-break {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .print-only {
      display: none;
    }

    sup {
      font-size: 0.72em;
      vertical-align: super;
      line-height: 0;
    }

    @media print {
      @page {
        size: letter portrait;
        margin: 0.55in;
      }

      html,
      body {
        background: white !important;
        color: black !important;
      }

      .print\:hidden {
        display: none !important;
      }

      .screen-only {
        display: none !important;
      }

      .print-only {
        display: block !important;
      }

      a {
        color: black !important;
        text-decoration: none !important;
      }

      .print-page {
        min-height: calc(11in - 1.1in);
        break-after: page;
        page-break-after: always;
        box-shadow: none !important;
      }

      .print-page:last-child {
        break-after: auto;
        page-break-after: auto;
      }

      .sticky,
      .fixed {
        position: static !important;

        overflow: visible !important;

      .max-w-6xl,
      .max-w-5xl {

      .shadow-sm,
      .shadow-md,

      .text-purple-700,

      }

      .bg-emerald-50,
      .bg-purple-50,
      .bg-slate-100,
      .bg-indigo-50 {

      }
    }

<body class="bg-gray-50 text-gray-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const Icon = ({ name, size = 18, className = "" }) => {
      const iconSvg =
        window.lucide && lucide.icons && lucide.icons[name]
          ? lucide.icons[name].toSvg({
            width: size,
            height: size,
            class: className,
          })
          : "";

      return (
        <span
          className="inline-flex"
          aria-hidden="true"
          dangerouslySetInnerHTML={{ __html: iconSvg }}
        />
      );
    };

    const Sup = ({ children }) => <sup>{children}</sup>;

    ];

    const FRAMEWORK_DATA = [/* full framework data omitted here in canvas? */];

    const colorStyles = {
      design: { card: "border-emerald-100", header: "bg-emerald-50 border-emerald-100", accent: "text-emerald-800", badge: "bg-emerald-200 text-emerald-800", solid: "bg-emerald-500", pill: "bg-white border-emerald-200 text-emerald-700" },
      transitionary: { card: "border-purple-100", header: "bg-purple-50 border-purple-100", accent: "text-purple-800", badge: "bg-purple-200 text-purple-800", solid: "bg-purple-500", pill: "bg-white border-purple-200 text-purple-700" },
      strategy: { card: "border-slate-200", header: "bg-slate-100 border-slate-200", accent: "text-slate-800", badge: "bg-slate-700 text-white", solid: "bg-slate-600", pill: "bg-slate-700 border-slate-700 text-white" }
    };

    const typeLabel = (type) => type === "design" ? "Design Focused" : type === "transitionary" ? "Transitionary" : "Strategy Focused";
    const measureLabel = (type) => type === "design" ? "Design Focused" : type === "transitionary" ? "Transitionary" : "Strategy Focused";
    const getStakeholderBaseLabel = (label) => label.split(" (")[0].trim();

    const TopicAccordion = ({ topic }) => {
      const [open, setOpen] = useState(true);
      return (
        <div className="border border-blue-100 rounded-xl bg-blue-50/40 overflow-hidden avoid-break">
          <button onClick={() => setOpen(!open)} className="w-full text-left p-3 flex items-start justify-between gap-3 screen-only">
            <div>
              <p className="text-sm font-bold text-gray-900 leading-snug">{topic.title}</p>
              {!open && (
                <p className="text-xs text-blue-700 mt-1">Click to view sample question</p>
              )}
            </div>
            <Icon name={open ? "chevron-up" : "chevron-down"} size={16} className="text-blue-600 mt-0.5 shrink-0 self-start" />
          </button>
          <div className={`${open ? 'block' : 'hidden'} screen-only px-3 pb-3`}>
            <p className="text-[11px] font-semibold uppercase tracking-wide text-blue-700 mb-1">Example question</p>
            <p className="text-sm italic text-gray-700 leading-relaxed">“{topic.question}”</p>
          </div>
          <div className="print-only p-3">
            <p className="text-[12px] font-semibold text-gray-900 leading-snug">{topic.title}</p>
            <p className="text-[11px] font-semibold uppercase tracking-wide text-blue-700 mt-2">Example question</p>
            <p className="text-[11px] italic text-gray-700 leading-relaxed mt-1">“{topic.question}”</p>
          </div>
        </div>
      );
    };

    const StrategyAccordion = ({ item, color = "purple" }) => {
      const [open, setOpen] = useState(true);
      const palette = color === "indigo" ? { box: "bg-indigo-50 border-indigo-100", text: "text-indigo-900", icon: "text-indigo-500", soft: "text-indigo-700" } : { box: "bg-purple-50 border-purple-100", text: "text-purple-900", icon: "text-purple-500", soft: "text-purple-700" };
      return (
        <div className={`rounded-xl border ${palette.box} overflow-hidden avoid-break`}>
          <button onClick={() => setOpen(!open)} className={`w-full p-3 text-left flex items-start justify-between gap-3 screen-only ${palette.text}`}>
            <div>
              {item.referenceUrl ? (
                <a href={item.referenceUrl} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="text-[13px] font-semibold leading-snug underline underline-offset-2">
                  {item.name}{item.citation ? <Sup>{item.citation}</Sup> : null}
                </a>
              ) : (
                <p className="text-[13px] font-semibold leading-snug">{item.name}{item.citation ? <Sup>{item.citation}</Sup> : null}</p>
              )}
            </div>
            <Icon name={open ? "chevron-up" : "chevron-down"} size={16} className={`${palette.icon} mt-0.5 shrink-0 self-start`} />
          </button>
          <div className={`${open ? 'block' : 'hidden'} screen-only px-3 pb-3`}>
            <p className="text-[13px] leading-relaxed text-gray-700">{item.description}</p>
          </div>
          <div className="print-only p-3">
            <p className={`text-[13px] font-semibold leading-snug ${palette.text}`}>{item.name}{item.citation ? <Sup>{item.citation}</Sup> : null}</p>
            <p className="text-[13px] leading-relaxed text-gray-700 mt-2">{item.description}</p>
          </div>
        </div>
      );
    };

    const OutcomeSection = ({ title, subtitle, children, defaultOpen = true, tone = null }) => {
      const [open, setOpen] = useState(defaultOpen);
      return (
        <section className={`bg-white rounded-xl border shadow-sm overflow-hidden ${tone ? tone.card : 'border-gray-200'}`}>
          <button onClick={() => setOpen(!open)} className={`w-full px-4 py-3 flex items-start justify-between gap-3 text-left ${tone ? tone.header : 'bg-gray-50 border-b border-gray-200'}`}>
            <div>
              <h3 className="font-bold text-lg text-gray-900">{title}</h3>
              {subtitle ? <p className="text-sm text-gray-600 mt-1">{subtitle}</p> : null}
            </div>
            <Icon name={open ? 'chevron-up' : 'chevron-down'} size={18} className="text-gray-500 mt-1 shrink-0 self-start" />
          </button>
          {open ? <div className="p-4">{children}</div> : null}
        </section>
      );
    };

    const FrameworkInstructionsSection = ({ complete = false }) => {
      const [open, setOpen] = useState(true);
      return (
        <section className={`${complete ? "print-page" : ""} bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden`}>
          <button onClick={() => setOpen(!open)} className="w-full px-6 py-4 flex items-start justify-between gap-3 text-left bg-white border-b border-gray-200 screen-only">

            </div>
            <Icon name={open ? 'chevron-up' : 'chevron-down'} size={18} className="text-gray-500 mt-1 shrink-0 self-start" />
          </button>
          {open ? <div className="screen-only p-6">...</div> : null}
          <div className="print-only p-6">...</div>
        </section>
      );
    };

    const App = () => {
      return <div>Use the downloaded HTML file for the full implementation.</div>;
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>

</html>
